# Traefik strips the /docs prefix, so nginx serves the built site from its root.
# try_files resolves Astro's directory-style clean URLs (with or without a
# trailing slash) and falls back to the generated 404 page.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    error_page 404 /404.html;
}
